<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Non Airbnb Workflow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8e4f5; font-family: system-ui, sans-serif; min-height: 100vh; padding: 24px; }

    h1 { text-align: center; color: #2d2060; font-size: 22px; margin-bottom: 20px; letter-spacing: -0.3px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: #6b5eae; font-size: 13px; font-weight: 700; text-decoration: none; margin-bottom: 16px; }
    .back-link:hover { text-decoration: underline; }

    .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      background: #fff;
      color: #6b5eae;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-btn.active { background: #2d2060; color: #fff; box-shadow: 0 4px 14px rgba(45,32,96,0.3); }
    .tab-btn:hover:not(.active) { background: #f0eefa; }

    .container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      max-width: 980px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .accordion { display: flex; flex-direction: column; gap: 10px; }

    .acc-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      background: #f7fafc;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
    }
    .acc-btn:hover { background: #ebf4ff; border-color: #bee3f8; }
    .acc-btn .acc-left { display: flex; align-items: center; gap: 10px; }
    .acc-btn .acc-icon { font-size: 18px; }
    .acc-btn .acc-arrow { font-size: 13px; color: #718096; transition: transform 0.3s ease; }
    .acc-btn.open .acc-arrow { transform: rotate(90deg); }

    .acc-body {
      display: none;
      border: 1px solid #e2e8f0;
      border-top: none;
      border-radius: 0 0 10px 10px;
      background: #fafcff;
      padding: 24px;
    }
    .acc-body.open { display: block; }
  </style>
</head>
<body>

  <div style="max-width: 980px; margin: 0 auto 16px auto;">
    <a href="index.html" class="back-link">← Back to Complaint Workflows</a>
  </div>

  <h1>Non Airbnb Workflow</h1>

  <div style="max-width: 980px; margin: 0 auto 20px auto; background: #2d2060; color: #fff; border-radius: 12px; padding: 16px 24px; box-shadow: 0 4px 20px rgba(45,32,96,0.4); font-size: 14px; font-weight: 600; text-align: center; letter-spacing: 0.2px;">
    🚧 &nbsp; This page is still being built — content coming soon.
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('content', this)">📋 Content Issues</button>
    <button class="tab-btn" onclick="switchTab('regular', this)">🛠️ Regular Complaints</button>
  </div>

  <div class="container">

    <!-- CONTENT ISSUES TAB -->
    <div id="tab-content" class="tab-panel active">
      <div class="accordion">

        <div>
          <button class="acc-btn" onclick="toggleAcc(this)">
            <div class="acc-left"><span class="acc-icon">📊</span><span>Workflow Diagram</span></div>
            <span class="acc-arrow">▶</span>
          </button>
          <div class="acc-body">
            <p style="color:#e53e3e; font-weight:700; font-size:15px;">In progress</p>
          </div>
        </div>

        <div>
          <button class="acc-btn" onclick="toggleAcc(this)">
            <div class="acc-left"><span class="acc-icon">🎫</span><span>Ticket Stages and Explanations</span></div>
            <span class="acc-arrow">▶</span>
          </button>
          <div class="acc-body">
            <p style="color:#e53e3e; font-weight:700; font-size:15px;">In progress</p>
          </div>
        </div>

      </div>
    </div>

    <!-- REGULAR COMPLAINTS TAB -->
    <div id="tab-regular" class="tab-panel">
      <div class="accordion">

        <div>
          <button class="acc-btn" onclick="toggleAcc(this)">
            <div class="acc-left"><span class="acc-icon">📊</span><span>Workflow Diagram</span></div>
            <span class="acc-arrow">▶</span>
          </button>
          <div class="acc-body">
            <p style="color:#e53e3e; font-weight:700; font-size:15px;">In progress</p>
          </div>
        </div>

        <div>
          <button class="acc-btn" onclick="toggleAcc(this)">
            <div class="acc-left"><span class="acc-icon">🎫</span><span>Ticket Stages and Explanations</span></div>
            <span class="acc-arrow">▶</span>
          </button>
          <div class="acc-body">
            <p style="color:#e53e3e; font-weight:700; font-size:15px;">In progress</p>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script>
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
    }

    function toggleAcc(btn) {
      const body = btn.nextElementSibling;
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    }
  </script>

</body>
</html>
